<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 13px;
        padding: 12px;
        color: #e0e0e0;
        background: #2b2b2b;
        width: 260px;
      }
      h3 { font-size: 14px; font-weight: 600; margin-bottom: 10px; }
      #domain { color: #8cf; margin-bottom: 10px; word-break: break-all; }
      button {
        width: 100%;
        padding: 8px;
        border-radius: 4px;
        border: 1px solid #555;
        background: #3a3a3a;
        color: #e0e0e0;
        cursor: pointer;
        font-size: 13px;
      }
      button:hover { background: #4a4a4a; }
      button.blocked { background: #2a6e2a; border-color: #3a8a3a; }
      button.blocked:hover { background: #3a8a3a; }
    </style>
  </head>
  <body>
    <h3>Tabius</h3>
    <div id="domain"></div>
    <button id="toggle"></button>
    <script src="popup.js"></script>
  </body>
</html>
